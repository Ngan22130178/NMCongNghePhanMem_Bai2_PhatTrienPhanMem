<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>My Silly Bestie - Chăm sóc thú cưng</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        /* CSS bổ sung để test nhanh hiệu ứng */
        #black-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: black; display: none; z-index: 9999;
        }
        #suspicion-bar { width: 200px; height: 20px; background: #eee; border: 1px solid #333; }
        #suspicion-fill { width: 0%; height: 100%; background: red; transition: 0.3s; }
    </style>
</head>
<body>
    <div id="black-overlay"></div>

    <div class="game-container">
        <h1>My Silly Bestie</h1>
        
        <div>
            <span>Độ cảnh giác: </span>
            <div id="suspicion-bar"><div id="suspicion-fill"></div></div>
        </div>

        <div class="panel">
            <h3>Bước 1: Chọn bạn đồng hành</h3>
            <button onclick="selectPet('capy-01')">Capybara</button>
            <button onclick="selectPet('cat-02')">Mèo Ngáo</button>
        </div>

        <div class="panel">
            <h3>Bước 2: Chọn dụng cụ tương tác</h3>
            <button onclick="useTool('comb')">Cầm cái lược</button>
            <button onclick="useTool('hand')">Bỏ dụng cụ (Dùng tay)</button>
        </div>

        <div id="pet-stage" class="stage">
            <h2 id="display-name">Hãy chọn thú cưng để bắt đầu</h2>
            <div class="pet-wrapper">
                <img id="pet-img" src="" style="display:none;">
            </div>
        </div>

        <button id="btn-reset" onclick="location.reload()" style="display:none; font-size: 20px; margin-top: 20px;">
            Chơi lại
        </button>
    </div>

    <script src="/js/script.js"></script>
</body>
</html>
